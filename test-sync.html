<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>בדיקת סנכרון</title>
<style>
body{font-family:sans-serif;background:#1a2744;color:#fff;padding:2rem;text-align:center}
button{font-size:1.2rem;padding:1rem 2rem;margin:.5rem;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:bold}
.del{background:#e74c3c;color:#fff}
.add{background:#2ecc71;color:#fff}
.sync{background:#c8a84b;color:#1a2744}
#log{margin-top:1.5rem;text-align:right;background:rgba(0,0,0,.3);padding:1rem;border-radius:10px;font-size:.85rem;max-height:300px;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<h1>בדיקת סנכרון ל-Google Sheets</h1>
<p>לחץ על הכפתורים לפי הסדר:</p>
<button class="del" onclick="step1()">1. מחק הכל</button>
<button class="add" onclick="step2()">2. צור 10 מתפללים</button>
<button class="sync" onclick="step3()">3. סנכרן ל-Sheets</button>
<div id="log">ממתין...</div>
<script>
var SHEETS_URL = localStorage.getItem('mbz_sheets_url') || '';
var SK = 'mbz_v5';
function log(msg){ document.getElementById('log').textContent += '\n' + msg; }

function step1(){
  localStorage.setItem(SK, '[]');
  log('✅ כל המתפללים נמחקו מ-localStorage');
}

  ];
  localStorage.setItem(SK, JSON.stringify(ms));

async function step3(){
  if(!SHEETS_URL){
    log('❌ לא מוגדר SHEETS_URL! הגדר אותו קודם בהגדרות האתר.');
    return;
  }
  log('⏳ שולח ל-Sheets: ' + SHEETS_URL.substring(0,50) + '...');
  try{
    var ms = JSON.parse(localStorage.getItem(SK) || '[]');
    log('📤 שולח ' + ms.length + ' מתפללים...');
    var r = await fetch(SHEETS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({action:'sync', members:ms})
    });
    var text = await r.text();
    log('📥 תשובה: ' + text.substring(0, 200));
    log('✅ הסנכרון הושלם! פתח את ה-Google Sheet ותבדוק.');
  }catch(e){
    log('❌ שגיאה: ' + e.message);
  }
}
</script>
