<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סרקו להרשמה — קהילת מבשר ציון</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #fff;
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px 20px;
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1.5;
  }
  #qr-code {
    width: 300px;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #qr-code img {
    width: 300px;
    height: 300px;
    image-rendering: pixelated;
  }
  .scan-text {
    font-size: 1.25rem;
    color: #444;
  }
  .address {
    font-size: 0.95rem;
    color: #888;
    margin-top: 16px;
  }
  .print-btn {
    margin-top: 8px;
    padding: 10px 28px;
    font-size: 1.1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #f5f5f5;
    cursor: pointer;
    font-family: inherit;
  }
  .print-btn:hover {
    background: #e8e8e8;
  }
  @media print {
    body { margin: 0; padding: 0; }
    .container { padding: 0; }
    .print-btn { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📱 סרקו להרשמה — קהילת מבשר ציון</h1>
  <div id="qr-code"></div>
  <p class="scan-text">סרקו את הקוד להרשמה לקהילה</p>
  <button class="print-btn" onclick="window.print()">🖨️ הדפס</button>
  <p class="address">קהילת מבשר ציון · רח׳ הצופית 23 · תל מונד</p>
</div>
<script>
  var qr = qrcode(0, 'M');
  qr.addData('https://spivakjon.github.io/mevaser-zion/');
  qr.make();
  document.getElementById('qr-code').innerHTML = qr.createImgTag(10, 0);
</script>
</body>
</html>
